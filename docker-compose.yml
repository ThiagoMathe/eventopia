version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: eventopia_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - eventopia_postgres_data:/var/lib/postgresql/data

volumes:
  eventopia_postgres_data: